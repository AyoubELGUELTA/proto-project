### This config file contains required core defaults that must be set, along with a handful of common optional settings.
### For a full list of available settings, see https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###
## There are a number of settings to tune the threading and token limits for LLM calls - check the docs.

completion_models:
  default_completion_model:
    model_provider: openai
    model: gpt-4o-mini-2024-07-18
    auth_method: api_key # or azure_managed_identity
    api_key: ${GRAPHRAG_API_KEY} # set this in the generated .env file, or remove if managed identity
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: text-embedding-3-large  # Garde, c'est déjà le meilleur
    dimensions: 3072               # Ajoute ça (max quality)
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    retry:
      type: exponential_backoff

### Document processing settings ###

input:
  type: text # [csv, text, json, jsonl]

chunking:
  type: tokens
  size: 900
  overlap: 200
  encoding_model: o200k_base

### Storage settings ###
## If blob storage is specified in the following four sections,
## connection_string and container_name must be provided

input_storage:
  type: file # [file, blob, cosmosdb]
  base_dir: "input"

output_storage:
  type: file # [file, blob, cosmosdb]
  base_dir: "output"

reporting:
  type: file # [file, blob]
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"
  cache_settings:
    max_cache_age_days: 30
    
vector_store:
  type: lancedb
  db_uri: output/lancedb

### Workflow settings ###

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"  # On va le customiser
  entity_types: [personne, lieu, evenement, concept_religieux, texte_sacre, periode_temps, tribu, relation_familiale]
  max_gleanings: 2  # ⬆️ Double pass pour précision
  encoding_model: o200k_base

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english # [regex_english, syntactic_parser, cfg]

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: true
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  
  # ✅ Description spécifique Islam
  description: |
    Extract factual claims about:
    - Historical events (battles, treaties, dates)
    - Family relationships (marriage, parentage, siblings)
    - Religious teachings (concepts, practices)
    - Hadith transmission chains (narrators, authenticity)
    - Biographical facts (ages, locations, roles)
    
    Always note:
    - Source type (Coran, Hadith Sahih/Hassan/Daif, Sira)
    - Source reference if available (Bukhari 5133, etc.)
    - Confidence level (explicit vs inferred)
  
  max_gleanings: 1  # Garde 1 pour coût
  
  # Types claims Islam
  claim_types: [
    fait_historique,
    relation_familiale,
    enseignement_religieux,
    transmission_hadith,
    fait_biographique,
    date_evenement
  ]

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 1500      #  Plus concis
  max_input_length: 6000 # Évite dilution

snapshots:
  graphml: false
  embeddings: false

### Query settings ###
## The prompt locations are required here, but each search method has a number of optional knobs that can be tuned.
## See the config docs: https://microsoft.github.io/graphrag/config/yaml/#query

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
