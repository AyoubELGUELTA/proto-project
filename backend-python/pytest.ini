[pytest]
asyncio_mode = strict
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# --- SILENCE LE BRUIT ---
# On ne garde que les WARNING ou INFO pour les librairies bruyantes
log_level = INFO
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Configuration spécifique aux loggers (Format: logger_name:LEVEL)
# Note : Selon les versions de pytest-cov/dist, cette syntaxe peut varier.
# La méthode la plus fiable est de le mettre dans un conftest.py, 
# mais teste déjà ces filtres :
log_cli_map = 
    httpx:WARNING
    httpcore:WARNING
    openai:INFO
    urllib3:WARNING
    asyncpg:WARNING
    botocore:WARNING