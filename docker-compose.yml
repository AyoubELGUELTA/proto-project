services:
  # --- Qdrant : Vector DB ---
  qdrant:
    container_name: qdrant

    env_file: .env
    image: qdrant/qdrant:latest

    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # --- PostgreSQL : DB ---
  postgres:
    container_name: postgres
    # Utilisation de l'image officielle pgvector
    image: pgvector/pgvector:pg16 
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- FastAPI : RAG Engine ---
  fastapi:
    container_name: fastapi_rag
    env_file: .env

    build:
      context: ./backend-python
      dockerfile: Dockerfile
    volumes:
      - ./backend-python:/app           
      - hf_cache:/root/.cache/huggingface # Persiste les modèles téléchargés
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped

  # --- Node.js : Backend / Gateway ---
  backend-node:
    container_name: node_gateway

    env_file: .env
    build: ./backend-node
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped

  minio:
    container_name: minio
    image: minio/minio
    env_file: .env
    ports:
      - "9000:9000"       # API S3
      - "9001:9001"       # Console UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  neo4j:
    container_name: neo4j  
    image: neo4j:5.15-community    
    
    environment:

      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}  # Default user: neo4j
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'  # Plugins needed
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - ./db/neo4j/init.cypher:/var/lib/neo4j/import/init.cypher  # Script init
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  pg_data:
  hf_cache:
  minio_data:
  neo4j_data: